name: CI/CD

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: 20

permissions:
    contents: read

jobs:
    # Job 0: Clean install, fails fast before spending CI minutes on the rest
    install:
        name: Install dependencies
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_URL: ${{ secrets.AUTH_URL }}
            AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
            UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            CRON_SECRET: ${{ secrets.CRON_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            # min-release-age requires npm 11.10+; upgrade explicitly since Node 20's
            # bundled npm may be older
            - run: npm install -g npm@latest

            # --ignore-scripts is safe here since `prisma generate` is invoked
            # explicitly below rather than via a postinstall hook
            - run: npm ci --ignore-scripts --no-audit --min-release-age=3
            - run: npx prisma generate

    # Job 1: Security audit (runs in parallel with linting and type checking)
    security_audit:
        name: Security audit
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm install -g npm@latest
            - run: npm ci --ignore-scripts --no-audit --min-release-age=3
            - run: npm audit --audit-level=critical --omit=dev

    # Job 2: Linting
    linting:
        name: Lint
        needs: install
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_URL: ${{ secrets.AUTH_URL }}
            AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
            UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            CRON_SECRET: ${{ secrets.CRON_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm install -g npm@latest
            - run: npm ci --ignore-scripts --no-audit --min-release-age=3
            - run: npx prisma generate
            - run: npm run lint

    # Job 3: Type checking
    type_checking:
        name: Type check
        needs: install
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_URL: ${{ secrets.AUTH_URL }}
            AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
            UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            CRON_SECRET: ${{ secrets.CRON_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm install -g npm@latest
            - run: npm ci --ignore-scripts --no-audit --min-release-age=3
            - run: npx prisma generate
            - run: npx tsc --noEmit

    # Job 4: Unit tests (JUnit results uploaded as an artifact for visibility)
    unit_tests:
        name: Unit tests
        needs: install
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_URL: ${{ secrets.AUTH_URL }}
            AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
            UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            CRON_SECRET: ${{ secrets.CRON_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm install -g npm@latest
            - run: npm ci --ignore-scripts --no-audit --min-release-age=3
            - run: npx prisma generate
            - run: npm run test:ci
            - name: Upload JUnit results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: junit-results
                  path: junit.xml
                  retention-days: 7

    # Job 5: Production build
    production_build:
        name: Build
        needs: [security_audit, linting, type_checking, unit_tests]
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_URL: ${{ secrets.AUTH_URL }}
            AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
            UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            CRON_SECRET: ${{ secrets.CRON_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm install -g npm@latest
            - run: npm ci --ignore-scripts --no-audit --min-release-age=3
            - run: npx prisma generate
            - run: npm run build
            - uses: actions/upload-artifact@v4
              with:
                  name: production-build
                  path: |
                      .next/
                      public/
                      package.json
                      next.config.ts
                  retention-days: 7

    # Job 6: Docker image build and push to GitHub Container Registry (only on pushes to main)
    docker_image_build:
        name: Build and push Docker image
        needs: production_build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Get short SHA
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

            - name: Set lowercase image name
              id: image
              run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/${{ steps.image.outputs.name }}:${{ steps.vars.outputs.sha_short }}
                      ghcr.io/${{ steps.image.outputs.name }}:latest

    # Job 7: Deploy to Vercel (only on pushes to main)
    vercel_deploy:
        name: Deploy to Vercel
        needs: production_build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_URL: ${{ secrets.AUTH_URL }}
            AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
            UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            CRON_SECRET: ${{ secrets.CRON_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - run: npm install -g vercel
            - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
            - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
            - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
