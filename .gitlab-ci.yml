# .gitlab-ci.yml
# Node 20 alpine is a small and fast image, perfect for Next.js 16 (requires Node 20.9+)
image: node:20-alpine

stages:
  - install
  - check # Combines audit, lint and typecheck for parallel execution
  - test
  - build
  - package

# Global cache configuration
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .next/cache/

# Ensures that needed libraries are present for Next.js packages (e.g., sharp)
before_script:
  - apk add --no-cache libc6-compat openssl
  - npm ci --prefer-offline --no-audit
  - npx prisma generate

# Job 0: Quick installation (not strictly necessary, but ensures a clean cache for the subsequent jobs)
install_dependencies:
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Job 1: Security Audit (runs in parallel with linting and type checking)
security_audit:
  stage: check
  script:
    - npm audit --audit-level=critical --omit=dev
  allow_failure: false

# Job 2: Linting
linting:
  stage: check
  script:
    - npm run lint

# Job 3: Type Checking
type_checking:
  stage: check
  script:
    - npx tsc --noEmit

# Job 4: Unit Tests (with JUnit reporting for CI visibility)
unit_tests:
  stage: test
  script:
    - npm run test:ci
  artifacts:
    when: always
    reports:
      junit: junit.xml

# Job 5: Production Build
production_build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
      - public/
      - package.json
      - next.config.ts
    expire_in: 1 week

# Job 6: Docker Image Build and Push to GitLab Container Registry
# Only run when mergin development into production to avoid unessecary builds.
docker_image_build:
  stage: package
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Override the global before_script since 'npm' doesn't exist in the docker image
    - docker info
    # Authenticate with Docker Hub using personal access token
    # GitLab AU does not have Container Registry enabled at the instance level,
    # preventing pushes to registry.gitlab.au.dk despite correct credentials
    - docker login -u $DOCKER_HUB_USER -p $DOCKER_HUB_TOKEN
  script:
    # Tag with both short SHA (for rollback precision) and latest (for easy reference)
    - docker build -t $DOCKER_HUB_USER/chroniqo-app:$CI_COMMIT_SHORT_SHA -t $DOCKER_HUB_USER/chroniqo-app:latest .
    - docker push $DOCKER_HUB_USER/chroniqo-app:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_HUB_USER/chroniqo-app:latest
  needs:
    # Ensure this only runs if the Next.js build was successful
    - production_build
  rules:
    # Only build and push to the registry when merging to the production branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Job 7: Auto-deploy to Vercel on every push to production
vercel_deploy:
  stage: package
  image: node:20-alpine
  before_script:
    - npm install -g vercel
  script:
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
  needs:
    - production_build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
